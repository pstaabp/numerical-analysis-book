P_{0,1,2, \ldots, n}(x) \amp = a_{0} + a_{1} (x-x_{0}) + a_{2} (x-x_{0})(x-x_{1}) + \notag\\
\amp \qquad \qquad \cdots + a_{n} (x-x_{0})(x-x_{1}) \cdots (x-x_{n-1}),\notag\\

\end{align}
